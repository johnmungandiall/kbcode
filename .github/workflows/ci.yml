name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: python -m pip install -e ".[dev]"
      - name: Lint with ruff
        run: ruff check .
      - name: Byte-compile (de-facto build check)
        # compileall, not `py_compile kbcode/*.py`: PowerShell (the Windows
        # runner shell) doesn't expand globs, so py_compile got the literal
        # `kbcode/*.py` and failed on every Windows job.
        run: python -m compileall -q kbcode
      - name: Run tests
        run: pytest -q
